name: tbc-build

# tbc/index.html is generated by tbc/build_tbc_guide.py (the data + generator
# are the source of truth; the committed HTML is the build output). This fails
# the PR if the HTML was hand-edited or the generator was edited without a
# rebuild — the same guard hub-build.yml provides for the hub's index.html.
on:
  pull_request:
    paths:
      - tbc/**
  push:
    branches: [main]
    paths:
      - tbc/**

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: tbc/index.html is in sync with build_tbc_guide.py
        run: python3 tbc/build_tbc_guide.py --check
